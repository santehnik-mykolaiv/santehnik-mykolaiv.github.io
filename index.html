<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Сантехник Николаев — выезд 30–60 минут</title>
<meta name="description" content="Срочный сантехник в Николаеве. Устранение засоров, течей, установка сантехники. Без посредников.">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#f5f6f8;
color:#111;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
padding-bottom:110px;
}

h1{
font-size:22px;
text-align:center;
}

.sub{
text-align:center;
color:#555;
margin-bottom:15px;
}

.block{
background:#fff;
padding:15px;
margin:10px 0;
border-radius:10px;
}

input{
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-top:10px;
}

button{
width:100%;
padding:14px;
font-size:16px;
margin-top:10px;
border:none;
border-radius:8px;
background:#229ED9;
color:#fff;
cursor:pointer;
}

.footer-buttons{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
z-index:999;
}

.btn{
flex:1;
text-align:center;
padding:14px;
font-weight:bold;
color:#fff;
text-decoration:none;
}

.call{background:#e60000;}
.telegram{background:#229ED9;}

/* Toast */
.toast{
position:fixed;
left:50%;
bottom:30px;
transform:translateX(-50%) translateY(20px);
background:#111;
color:#fff;
padding:14px 18px;
border-radius:10px;
font-size:14px;
opacity:0;
transition:0.3s;
z-index:9999;
max-width:90%;
text-align:center;
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

.toast.success{background:#16a34a;}
.toast.error{background:#dc2626;}
</style>
</head>

<body>

<div class="container">

<h1>Сантехник в Николаеве</h1>
<div class="sub">Частный мастер • Выезд за 30 минут • Без посредников</div>

<div style="background:#25D366;color:#fff;text-align:center;padding:18px;border-radius:12px;font-size:22px;font-weight:bold;">
☎️ <a href="tel:+380756177729" style="color:#fff;text-decoration:none;">+380 75 617 77 29</a>
</div>

<div class="block">
<b>🚨 Аварийный вызов:</b><br><br>
• Прорвало трубу<br>
• Засорилась канализация<br>
• Не уходит вода<br>
• Течёт кран или стояк
</div>

<!-- ФОРМА -->
<div class="block">
<b>💬 Оставьте номер — перезвоню за 2 минуты</b>

<form id="callbackForm">
<input type="tel" id="phone" value="+380" required>
<button type="submit">Перезвонить</button>
</form>

</div>

</div>

<div class="footer-buttons">
<a class="btn call" href="tel:+380756177729">📞 Позвонить</a>
<a class="btn telegram" href="#" onclick="focusPhone()">💬 Заявка</a>
</div>

<div id="toast" class="toast"></div>

<script>
function focusPhone(){
  document.getElementById('phone').focus();
}

function showToast(text, type="success"){
  const toast = document.getElementById("toast");
  toast.innerText = text;
  toast.className = "toast show " + type;

  setTimeout(()=>{
    toast.className = "toast";
  }, 4000);
}

document.getElementById("callbackForm").addEventListener("submit", function(e){
  e.preventDefault();

  const phone = document.getElementById("phone").value.trim();
  const regex = /^\+380\d{9}$/;

  if(!regex.test(phone)){
    showToast("Введите номер в формате +380XXXXXXXXX", "error");
    return;
  }

  fetch("https://santehnik.mk.ua/callback.php", {
    method: "POST",
    headers: {"Content-Type": "application/x-www-form-urlencoded"},
    body: "phone=" + encodeURIComponent(phone)
  })
  .then(res => res.json())
  .then(data => {
    showToast(data.message, data.status);

    if(data.status === "success"){
      document.getElementById("phone").value = "+380";
    }
  })
  .catch(()=>{
    showToast("Ошибка отправки. Попробуйте позже.", "error");
  });
});
</script>

</body>
</html>
